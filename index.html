<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corentin Le Guen · FORGE OS</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#050508;--bg2:#0a0d14;--bg3:#0f1520;--green:#00ff41;--cyan:#00d4ff;--orange:#ff6b35;--red:#ff4444;--text:#b8ffc5;--text-dim:#4a7a55;--border:rgba(0,255,65,0.25);--glow:0 0 12px rgba(0,255,65,0.5);--font-mono:'JetBrains Mono','Courier New',monospace;--font-hud:'Orbitron',monospace;--taskbar-h:42px}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100vw;height:100vh;overflow:hidden;font-family:var(--font-mono);background:#000;color:var(--text);cursor:default}
    body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999}
    #boot{position:fixed;inset:0;background:#000;z-index:1000;display:flex;flex-direction:column;justify-content:center;padding:clamp(24px,5vw,60px);transition:opacity .6s}
    #boot.fade-out{opacity:0;pointer-events:none}
    #boot-ascii{font-family:var(--font-hud);font-size:clamp(18px,4vw,42px);font-weight:900;color:var(--green);text-shadow:var(--glow);letter-spacing:.1em;margin-bottom:8px}
    #boot-sub{font-size:11px;color:var(--text-dim);margin-bottom:32px;letter-spacing:.15em}
    #boot-lines{max-width:640px}
    .boot-line{font-size:12px;line-height:2;color:var(--text-dim);opacity:0;transform:translateX(-6px);transition:opacity .2s,transform .2s}
    .boot-line.show{opacity:1;transform:none}
    .boot-line .ok{color:var(--green);margin-left:6px}
    .boot-line .warn{color:var(--orange);margin-left:6px}
    #boot-progress-wrap{margin-top:24px;width:300px;height:2px;background:rgba(0,255,65,.1);border-radius:2px;overflow:hidden}
    #boot-progress-bar{height:100%;background:var(--green);width:0;box-shadow:var(--glow);transition:width .3s ease}
    #desktop{position:fixed;inset:0;bottom:var(--taskbar-h);opacity:0;transition:opacity .6s;overflow:hidden}
    #desktop.show{opacity:1}
    #desk-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,255,65,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,65,.025) 1px,transparent 1px);background-size:44px 44px;background-color:var(--bg)}
    #desk-bg::before{content:'FORGE OS v2.0 // CORENTIN LE GUEN — DÉVELOPPEUR WEB FULL-STACK';position:absolute;bottom:16px;right:20px;font-size:9px;color:rgba(0,255,65,.15);letter-spacing:.2em}
    #desk-icons{position:absolute;top:20px;left:20px;display:flex;flex-direction:column;gap:14px}
    .d-icon{display:flex;flex-direction:column;align-items:center;gap:5px;width:72px;padding:7px;border-radius:6px;cursor:pointer;transition:background .15s;user-select:none}
    .d-icon:hover{background:rgba(0,255,65,.08)}
    .d-icon-img{width:50px;height:50px;border:1px solid var(--border);border-radius:8px;background:rgba(0,255,65,.06);display:flex;align-items:center;justify-content:center;font-size:26px;transition:box-shadow .2s,border-color .2s}
    .d-icon:hover .d-icon-img{border-color:rgba(0,255,65,.6);box-shadow:0 0 16px rgba(0,255,65,.2)}
    .d-icon-label{font-size:9px;color:var(--text);text-align:center}
    #taskbar{position:fixed;bottom:0;left:0;right:0;height:var(--taskbar-h);background:rgba(5,5,8,.96);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;z-index:500;backdrop-filter:blur(12px)}
    #tb-logo{font-family:var(--font-hud);font-size:10px;font-weight:700;color:var(--green);text-shadow:var(--glow);white-space:nowrap;margin-right:6px}
    #tb-sep{width:1px;height:22px;background:var(--border)}
    #tb-apps{display:flex;gap:4px;flex:1;overflow:hidden}
    .tb-btn{padding:4px 12px;font-family:var(--font-mono);font-size:10px;color:var(--text-dim);background:rgba(0,255,65,.04);border:1px solid transparent;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap}
    .tb-btn:hover{color:var(--text);background:rgba(0,255,65,.08)}
    .tb-btn.active{color:var(--green);border-color:var(--border);background:rgba(0,255,65,.1)}
    .tb-btn.minimized{opacity:.6}
    #tb-clock{font-size:11px;color:var(--text-dim);white-space:nowrap}
    .win{position:absolute;background:var(--bg2);border:1px solid var(--border);border-radius:8px;min-width:320px;min-height:220px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 40px rgba(0,0,0,.7)}
    .win.focused{border-color:rgba(0,255,65,.5);box-shadow:0 0 0 1px rgba(0,255,65,.12),0 8px 50px rgba(0,0,0,.8),0 0 30px rgba(0,255,65,.06)}
    .win-bar{display:flex;align-items:center;padding:9px 12px;background:rgba(0,255,65,.04);border-bottom:1px solid var(--border);cursor:grab;gap:10px;flex-shrink:0}
    .win-bar:active{cursor:grabbing}
    .win-dots{display:flex;gap:7px}
    .wd{width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;transition:filter .15s}
    .wd:hover{filter:brightness(1.3)}
    .wd-r{background:#ff5f57}.wd-y{background:#ffbd2e}.wd-g{background:#28ca42}
    .win-title{font-size:11px;color:var(--text-dim);flex:1}
    .win-body{flex:1;overflow-y:auto;padding:20px;font-size:12.5px;line-height:1.75;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .win-body::-webkit-scrollbar{width:4px}
    .win-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    #mobile{display:none;position:fixed;inset:0;background:var(--bg);overflow:hidden;opacity:0;transition:opacity .6s;flex-direction:column}
    #mobile.show{opacity:1;display:flex}
    #chat-header{flex-shrink:0;padding:48px 18px 14px;background:rgba(0,255,65,.03);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
    #chat-avatar{width:38px;height:38px;border-radius:50%;border:1px solid var(--green);background:rgba(0,255,65,.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:var(--glow)}
    #chat-info{flex:1}
    #chat-name{font-family:var(--font-hud);font-size:11px;color:var(--green);text-shadow:var(--glow);letter-spacing:.08em}
    #chat-sub{font-size:10px;color:var(--text-dim);margin-top:2px}
    #chat-online{font-size:10px;color:var(--text-dim);margin-top:1px}
    #chat-online::before{content:'⬤ ';color:var(--green);font-size:7px}
    #chat-messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px;scrollbar-width:none}
    #chat-messages::-webkit-scrollbar{display:none}
    .msg{display:flex;flex-direction:column;max-width:84%;animation:msgIn .22s ease}
    @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .msg.bot{align-self:flex-start}
    .msg.user{align-self:flex-end;align-items:flex-end}
    .msg-bubble{padding:10px 14px;border-radius:18px;font-size:12.5px;line-height:1.65}
    .msg.bot .msg-bubble{background:var(--bg2);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
    .msg.user .msg-bubble{background:rgba(0,255,65,.1);border:1px solid rgba(0,255,65,.3);border-bottom-right-radius:4px;color:var(--green)}
    .msg-time{font-size:9px;color:var(--text-dim);margin-top:4px;padding:0 4px}
    .typing-bubble{background:var(--bg2);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:4px;padding:12px 16px;display:flex;gap:5px;align-items:center;align-self:flex-start;animation:msgIn .22s ease}
    .typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);animation:tdot 1.2s ease infinite}
    .typing-dot:nth-child(2){animation-delay:.2s}
    .typing-dot:nth-child(3){animation-delay:.4s}
    @keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
    #chat-suggestions{flex-shrink:0;padding:10px 14px 28px;border-top:1px solid var(--border);background:rgba(5,5,8,.97);backdrop-filter:blur(10px)}
    #sug-label{font-size:9px;color:var(--text-dim);letter-spacing:.12em;margin-bottom:8px}
    #sug-chips{display:flex;flex-wrap:wrap;gap:7px}
    .sug-chip{padding:7px 13px;background:rgba(0,255,65,.05);border:1px solid var(--border);border-radius:20px;font-family:var(--font-mono);font-size:11px;color:var(--text);cursor:pointer;transition:all .12s;-webkit-tap-highlight-color:transparent}
    .sug-chip:active{background:rgba(0,255,65,.18);border-color:var(--green);color:var(--green);transform:scale(.96)}
    .r-key{color:var(--cyan)}.r-val{color:#ffd700}.r-hi{color:var(--green)}.r-dim{color:var(--text-dim);font-style:italic}.r-tag{display:inline-block;padding:1px 7px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:3px;font-size:10px;color:var(--cyan);margin:2px 2px 2px 0}.r-sep{display:block;height:1px;background:var(--border);margin:8px 0}
    .app-hdr{font-family:var(--font-hud);font-size:11px;color:var(--green);text-shadow:var(--glow);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);letter-spacing:.12em}
    .tl{margin-bottom:3px}
    .prompt{color:var(--green)}.cmt{color:var(--text-dim);font-style:italic}.key{color:var(--cyan)}.val{color:var(--orange)}.str{color:#ffd700}.num{color:#bd93f9}.bool{color:#50fa7b}
    .cursor::after{content:'█';animation:blink 1s step-end infinite}
    @keyframes blink{50%{opacity:0}}
    .sep{height:1px;background:var(--border);margin:14px 0}
    .timeline{position:relative;padding-left:20px}
    .timeline::before{content:'';position:absolute;left:5px;top:6px;bottom:6px;width:1px;background:var(--border)}
    .tl-item{position:relative;margin-bottom:16px}
    .tl-dot{position:absolute;left:-18px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(0,255,65,.6)}
    .tl-dot.dim{background:var(--text-dim);box-shadow:none}
    .tl-date{font-size:10px;color:var(--text-dim);margin-bottom:2px}
    .tl-role{font-size:12.5px;color:var(--green);font-weight:600}
    .tl-org{font-size:11px;color:var(--cyan);margin-bottom:3px}
    .tl-desc{font-size:11px;color:var(--text-dim);line-height:1.6}
    .sk-wrap{margin-bottom:11px}
    .sk-hdr{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11.5px}
    .sk-bar{height:4px;background:rgba(0,255,65,.1);border-radius:3px;overflow:hidden}
    .sk-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--cyan));box-shadow:0 0 8px rgba(0,255,65,.4);width:0;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
    .proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .proj-card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:14px;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;text-decoration:none;display:block;color:inherit}
    .proj-card:hover{border-color:rgba(0,255,65,.6);transform:translateY(-2px);box-shadow:0 0 16px rgba(0,255,65,.12)}
    .proj-name{color:var(--green);font-size:12.5px;font-weight:700;margin-bottom:6px}
    .proj-desc{color:var(--text-dim);font-size:10.5px;line-height:1.5}
    .proj-tags{margin-top:10px;display:flex;flex-wrap:wrap;gap:4px}
    .proj-status{font-size:9px;color:var(--orange);border:1px solid rgba(255,107,53,.35);border-radius:3px;padding:1px 6px;display:inline-block;margin-bottom:6px}
    .proj-status.ok{color:var(--green);border-color:rgba(0,255,65,.35)}
    .tag{padding:2px 7px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.3);border-radius:3px;font-size:9px;color:var(--cyan)}
    .pf-head{font-family:var(--font-hud);font-size:20px;font-weight:900;color:var(--orange);text-shadow:0 0 20px rgba(255,107,53,.45);margin-bottom:6px}
    .price-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
    .price-card{background:var(--bg3);border:1px solid rgba(255,107,53,.25);border-radius:6px;padding:12px}
    .pc-name{color:var(--orange);font-size:10px;font-weight:700;letter-spacing:.1em}
    .pc-price{color:#fff;font-size:20px;font-weight:700;margin:4px 0}
    .pc-desc{color:var(--text-dim);font-size:10px}
    .clink{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:5px;margin-bottom:9px;text-decoration:none;color:var(--text);transition:all .15s}
    .clink:hover{border-color:var(--green);background:rgba(0,255,65,.04);color:var(--green)}
    .ci{font-size:20px}.ct-title{font-size:12px;font-weight:600}.ct-sub{font-size:10.5px;color:var(--text-dim);margin-top:2px}
    #t-out{font-size:12px;line-height:1.85}
    #t-in-line{display:flex;align-items:center;gap:8px;margin-top:10px}
    #t-prompt{color:var(--green);font-size:12px;white-space:nowrap}
    #t-input{background:none;border:none;outline:none;color:var(--text);font-family:var(--font-mono);font-size:12px;flex:1}

    /* ── GLITCH PHOTO ── */
    .holo-wrap{position:relative;width:120px;height:120px;flex-shrink:0;margin-bottom:14px}
    .holo-wrap.small{width:72px;height:72px;margin-bottom:0;margin-right:12px}
    .holo-hex{position:relative;width:100%;height:100%;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);overflow:hidden;background:#000}
    .holo-img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;filter:saturate(0.7) brightness(0.9) hue-rotate(10deg);mix-blend-mode:normal}
    .holo-scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,65,0.06) 3px,rgba(0,255,65,0.06) 4px);pointer-events:none;animation:scanmove 4s linear infinite}

function termKey(e){
  if(e.key!=='Enter')return;
  const inp=document.getElementById('t-input'),out=document.getElementById('t-out');
  if(!inp||!out)return;
  const cmd=inp.value.trim().toLowerCase();inp.value='';
  const row=document.createElement('div');row.className='tl';
  row.innerHTML=`<span class="prompt">forge@cv:~$</span> ${esc(cmd)}`;out.appendChild(row);
  if(cmd){
    const fn=CMDS[cmd]||(()=>`<span class="val">Inconnu :</span> '${esc(cmd)}'. Tapez <span class="str">help</span>.`);
    const res=fn();
    if(res==='__CLEAR__'){out.innerHTML='';}
    else{const rd=document.createElement('div');rd.className='tl';rd.style.marginBottom='6px';rd.innerHTML=res;out.appendChild(rd);}
  }
  out.appendChild(document.createElement('br'));out.scrollTop=out.scrollHeight;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

let zTop=100;const wins={};
function openApp(id){
  const app=APPS[id];if(!app)return;
  if(wins[id]){focusWin(id);return;}
  const offset=Object.keys(wins).length*26;
  const el=document.createElement('div');el.className='win focused';el.id='win-'+id;
  el.style.cssText=`z-index:${++zTop};left:${100+offset}px;top:${48+offset}px;width:${app.w||540}px;height:${app.h||400}px`;
  el.innerHTML=`<div class="win-bar"><div class="win-dots"><button class="wd wd-r" onclick="closeWin('${id}')"></button><button class="wd wd-y" onclick="minWin('${id}')"></button><button class="wd wd-g" onclick="maxWin('${id}')"></button></div><div class="win-title">${app.title}</div></div><div class="win-body">${app.render()}</div>`;
  el.addEventListener('mousedown',()=>focusWin(id));
  makeDraggable(el,el.querySelector('.win-bar'));
  document.getElementById('desktop').appendChild(el);
  wins[id]={el,minimized:false};updateTB();
  if(app.onOpen)app.onOpen();
}
function focusWin(id){
  document.querySelectorAll('.win').forEach(w=>w.classList.remove('focused'));
  const w=wins[id];if(!w)return;
  w.el.classList.add('focused');w.el.style.zIndex=++zTop;w.el.style.display='flex';w.minimized=false;updateTB();
}
function closeWin(id){const w=wins[id];if(w)w.el.remove();delete wins[id];updateTB()}
function minWin(id){const w=wins[id];if(!w)return;w.el.style.display='none';w.minimized=true;updateTB()}
function maxWin(id){
  const w=wins[id];if(!w)return;
  if(w.el.dataset.maxed){w.el.style.cssText=w.el.dataset.prev;delete w.el.dataset.maxed;}
  else{w.el.dataset.prev=w.el.style.cssText;w.el.style.cssText=`z-index:${w.el.style.zIndex};left:0;top:0;width:100vw;height:calc(100vh - var(--taskbar-h))`;w.el.dataset.maxed='1';}
}
function updateTB(){
  const c=document.getElementById('tb-apps');c.innerHTML='';
  Object.entries(wins).forEach(([id,w])=>{
    const b=document.createElement('button');b.className='tb-btn'+(w.minimized?' minimized':' active');
    b.textContent=APPS[id].title.replace('~/','');b.onclick=()=>focusWin(id);c.appendChild(b);
  });
}
function makeDraggable(el,handle){
  let px=0,py=0;
  handle.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('wd'))return;
    px=e.clientX-el.offsetLeft;py=e.clientY-el.offsetTop;
    const mm=ev=>{el.style.left=(ev.clientX-px)+'px';el.style.top=(ev.clientY-py)+'px'};
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);e.preventDefault();
  });
}

    a: `Je suis en <span class="r-hi">Prépa Numérique au GRETA d'Orléans</span> et je recherche une <span class="r-val">alternance développement web</span> pour <span class="r-val">2026</span>.<span class="r-sep"></span><span class="r-key">Zone :</span> Chartres · Orléans · Île-de-France · Télétravail<span class="r-sep"></span><span class="r-key">Ce que j'apporte :</span><br>• Autonomie prouvée — 4 projets livrés seul<br>• Micro-entrepreneur actif (sens client réel)<br>• Rigueur background QSE appliquée au code<br>• Motivation 100% — pas un pivot par défaut<span class="r-sep"></span><span class="r-dim">// Permis B + véhicule personnel</span>`,

  contact: {

    a: `📧 <a href="mailto:lgn.corentin@gmail.com" style="color:var(--green)">lgn.corentin@gmail.com</a><span class="r-sep"></span>📱 <span class="r-val">06 21 82 18 15</span><span class="r-sep"></span>🐙 <a href="https://github.com/0New2" target="_blank" style="color:var(--cyan)">github.com/0New2</a><span class="r-sep"></span>💼 <a href="https://www.linkedin.com/in/corentin-le-guen-5860a8171/" target="_blank" style="color:var(--cyan)">LinkedIn — Corentin Le Guen</a><span class="r-sep"></span>🔮 <a href="https://0new2.github.io/Pixel-Forge/" target="_blank" style="color:var(--orange)">0new2.github.io/Pixel-Forge</a>`,

  }
};

const INITIAL_SUGGESTIONS = ['whoami','skills','projects','alternance'];

function now(){return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}

function addMsg(type, html){
  const msgs = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'msg ' + type;
  el.innerHTML = `<div class="msg-bubble">${html}</div><div class="msg-time">${now()}</div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

function showTyping(){
  const msgs = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'typing-bubble';
  el.id = 'typing';
  el.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping(){
  const el = document.getElementById('typing');
  if(el) el.remove();
}

function setSuggestions(keys){
  const chips = document.getElementById('sug-chips');
  chips.innerHTML = '';
  keys.forEach(k => {
    const r = CHAT_RESPONSES[k]; if(!r) return;
    const chip = document.createElement('div');
    chip.className = 'sug-chip';
    chip.textContent = r.q;
    chip.onclick = () => handleQuestion(k);
    chips.appendChild(chip);
  });
}

let busy = false;
function handleQuestion(key){
  if(busy) return;
  const r = CHAT_RESPONSES[key]; if(!r) return;
  busy = true;
  document.getElementById('sug-chips').innerHTML = '';
  addMsg('user', r.q);
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMsg('bot', r.a);
    setSuggestions(r.next);
    busy = false;
  }, 900 + Math.random()*400);
}

function initChat(){
  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML = '';
  setTimeout(()=>{
    showTyping();
    setTimeout(()=>{
      hideTyping();
      addMsg('bot', `Bonjour 👋 Je suis <span class="r-hi">FORGE OS</span>, le CV interactif de <span class="r-val">Corentin Le Guen</span>.<br><br>En <span class="r-hi">Prépa Numérique au GRETA d'Orléans</span>, en reconversion vers le développement web. Qu'est-ce qui vous intéresse ?<span class="r-sep"></span><span class="r-dim">💡 Sur ordinateur, une expérience complète vous attend :<br>fenêtres interactives, terminal, bureau hacker...<br></span><span style="color:var(--cyan);font-size:11px">→ 0new2.github.io/CV-numerique</span>`);
      setSuggestions(INITIAL_SUGGESTIONS);
    }, 1000);
  }, 400);
}

const BOOT_SEQ=[
  {t:'[ FORGE OS ]  Kernel initializing...',d:0,s:'ok'},
  {t:'[ CPU      ]  Processor ready...',d:260,s:'ok'},
  {t:'[ PROFILE  ]  Corentin Le Guen · 29 ans · Eure-et-Loir',d:500,s:'ok'},
  {t:'[ STATUS   ]  Prépa Numérique GRETA · Alternance 2026',d:720,s:'ok'},
  {t:'[ SKILLS   ]  JS · React · Node · Firebase · Git',d:920,s:'ok'},
  {t:'[ PROJECTS ]  7NP · INNOVART · Pixel-Forge · Loup-Garou',d:1100,s:'ok'},
  {t:'[ FORGE    ]  Pixel-Forge micro-entreprise active',d:1280,s:'ok'},
  {t:'[ NETWORK  ]  GitHub · LinkedIn · Email ok',d:1460,s:'ok'},
  {t:'[ COFFEE   ]  Brewing protocol initiated...',d:1640,s:'warn'},
  {t:'[ SYSTEM   ]  All systems nominal.',d:1820,s:'ok'},
  {t:'[ FORGE OS ]  Welcome 👋  Double-clic pour ouvrir une appli',d:2020,s:'ok'},
];

function boot(){
  const container=document.getElementById('boot-lines');
  const bar=document.getElementById('boot-progress-bar');
  const total=BOOT_SEQ.length;
  BOOT_SEQ.forEach(({t,d,s},i)=>{
    setTimeout(()=>{
      const ln=document.createElement('div');ln.className='boot-line';
      ln.innerHTML=t+(s==='ok'?'  <span class="ok">[  OK  ]</span>':'  <span class="warn">[ WARN ]</span>');
      container.appendChild(ln);requestAnimationFrame(()=>ln.classList.add('show'));
      bar.style.width=Math.round(((i+1)/total)*100)+'%';
    },d);
  });
  setTimeout(()=>{
    document.getElementById('boot').classList.add('fade-out');
    setTimeout(()=>{
      document.getElementById('boot').style.display='none';
      document.getElementById('desktop').classList.add('show');
      document.getElementById('mobile').classList.add('show');
      initChat();
    },600);
  },2800);
}
function tick(){
  const t=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  const c1=document.getElementById('tb-clock'),c2=document.getElementById('mob-time');
  if(c1)c1.textContent=t;if(c2)c2.textContent=t;
}
tick();setInterval(tick,1000);
window.addEventListener('DOMContentLoaded',boot);
</script>
